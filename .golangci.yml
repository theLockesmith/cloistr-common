version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosimple
    - gofmt
    - goimports

linters-settings:
  goimports:
    local-prefixes: git.aegis-hq.xyz/coldforge

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
